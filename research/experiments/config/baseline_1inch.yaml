# 1inch deterministic aggregator baseline (Section 5).
# Routes greedily by reported depth without learning or decay.
# Vulnerable to Byzantine spoofing -- routes heavily to inflated nodes.

env:
  num_makers: 10
  num_levels: 5
  decay_lambda: 0.1
  max_steps: 100
  order_size: 50.0
  base_liquidity: 100.0
  volatility: 5.0

baseline:
  type: oneinch
  # No additional params needed

simulation:
  byzantine_fraction: 0.2
  attack_type: spoofer
  alpha: 1.0
  eta: 0.5

training:
  episodes: 1000
  seed: 42
  log_dir: experiments/results/baseline_1inch
