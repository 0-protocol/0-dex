# 20% Byzantine nodes (Spoofer attack).
# Expected result: agent isolates malicious nodes within ~1000 episodes;
# final fill rate within 5% of baseline.
#
# Reference: Dong et al., "Defending against poisoning attacks in federated
# learning with blockchain", IEEE TAI 2024 -- Section IV experiments use
# 20% poisoned participants as the primary evaluation scenario.

env:
  num_makers: 10
  num_levels: 5
  decay_lambda: 0.1
  max_steps: 100
  order_size: 50.0
  base_liquidity: 100.0
  volatility: 5.0

agent:
  gat_layers: 2
  gat_heads: 4
  hidden_dim: 64
  lr: 3.0e-4
  algorithm: ppo

simulation:
  byzantine_fraction: 0.2
  attack_type: spoofer
  alpha: 1.0
  eta: 0.5

training:
  episodes: 2000
  seed: 42
  log_dir: experiments/results/byzantine_20
