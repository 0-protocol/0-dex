# Baseline experiment: no Byzantine nodes, uniform market conditions.
# Expected result: agent converges to optimal routing in ~500 episodes.

env:
  num_makers: 10
  num_levels: 5
  decay_lambda: 0.1
  max_steps: 100
  base_liquidity: 100.0
  volatility: 5.0

agent:
  gat_layers: 2
  gat_heads: 4
  hidden_dim: 64
  lr: 3.0e-4
  algorithm: ppo

simulation:
  byzantine_fraction: 0.0
  attack_type: spoofer          # irrelevant at 0%
  brier_alpha: 0.5

training:
  episodes: 2000
  seed: 42
  log_dir: experiments/results/baseline
