# 30% Byzantine nodes (Spoofer attack) — stress test.
# Expected result: slightly degraded convergence (~1500 episodes) but
# Brier penalty still drives Byzantine weights below 0.01.
#
# This pushes beyond the 1/3 BFT threshold and demonstrates resilience
# via learned routing rather than classical consensus.

env:
  num_makers: 10
  num_levels: 5
  decay_lambda: 0.1
  max_steps: 100
  base_liquidity: 100.0
  volatility: 5.0

agent:
  gat_layers: 2
  gat_heads: 4
  hidden_dim: 64
  lr: 3.0e-4
  algorithm: ppo

simulation:
  byzantine_fraction: 0.3
  attack_type: spoofer
  brier_alpha: 0.5

training:
  episodes: 3000
  seed: 42
  log_dir: experiments/results/byzantine_30
